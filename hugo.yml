---
baseURL: https://wiki.villela.co
title: Knowledge Wiki
# content
locale: en-us
enableRobotsTXT: true
publishdir: dist
metaDataFormat: yaml
disableKinds: ['taxonomyTerm']
footnoteReturnLinkContents: ↩
summarylength: 40
enableEmoji: true
canonifyURLs: true
ignoreErrors: ['error-remote-getjson']
timeout: '300s'

security:
  enableInlineShortcodes: false
  exec:
    allow: ['^dart-sass-embedded$', '^go$', '^npx$', '^postcss$', '^babel$']

markup:
  highlight:
    codeFences: true
    guessSyntax: false
    style: dracula
    tabWidth: 2
  tableOfContents:
    endLevel: 3
    ordered: false
    startLevel: 2

mediaTypes:
  application/feed+json:
    suffixes:
      - json
  text/typescript:
    suffixes:
      - ts

outputFormats:
  manifest:
    baseName: 'manifest'
    isPlainText: true
    mediaType: application/feed+json
    name: 'manifest'
    suffix: 'json'

taxonomies:
  tags: 'tags'

permalinks:
  section: '/:contentbasename/'
  tags: '/tags/:slug/'

outputs:
  home: ['html']
  page: ['html']
  section: ['html']

sitemap:
  changefreq: monthly
  filename: sitemap.xml
  priority: 0.5

params:
  meta:
    description: Personal knowledge wiki.
    author: Juan Villela
    social: fourjuaneight
    background: '#1a1a1a'
    theme: '#c390f3'
