{{ if .TableOfContents }}
<!-- Desktop TOC nav (visible in .toc-col on desktop) -->
<nav class="toc-nav" aria-label="On this page">
  <h4 class="toc-title">On this page</h4>
  {{ .TableOfContents }}
</nav>

<!-- Tablet TOC drawer (position: fixed, shown via JS on ≤1100px) -->
<div class="toc-drawer" id="toc-drawer">
  <button class="drawer-close icon-btn" id="toc-drawer-close" aria-label="Close table of contents">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <nav class="toc-nav" aria-label="On this page">
    <h4 class="toc-title">On this page</h4>
    {{ .TableOfContents }}
  </nav>
</div>
{{ end }}
