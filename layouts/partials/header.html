<header class="site-header">
  <div class="header-inner">
    <!-- Hamburger (visible ≤720px) -->
    <button class="icon-btn" id="menu-btn" aria-label="Open navigation">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="2" y1="12" x2="14" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>

    <!-- Logo -->
    <a href="{{ .Site.BaseURL }}" class="logo" aria-label="{{ .Site.Title }}">
      <span class="logo-mark" aria-hidden="true"></span>
      <span class="logo-word">Wiki</span>
    </a>

    <!-- Header actions -->
    <div class="header-actions">
      <!-- Search trigger -->
      <button class="search-trigger" id="search-trigger" aria-label="Search documentation">
        <svg class="search-trigger-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="5.5" cy="5.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
          <line x1="9" y1="9" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="search-trigger-text">Search</span>
        <kbd class="search-kbd">⌘K</kbd>
      </button>

      <!-- TOC button (visible ≤1100px) -->
      <button class="icon-btn" id="toc-btn" aria-label="Table of contents">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <line x1="2" y1="4" x2="6" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="12" x2="10" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>
</header>
