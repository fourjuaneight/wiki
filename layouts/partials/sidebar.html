<nav class="sidebar-nav" aria-label="Documentation navigation">
  {{ range .Site.Sections.ByTitle }}
    {{ $section := . }}
    <div class="nav-section">
      <a href="{{ $section.RelPermalink }}"
         class="nav-section-title{{ if eq $.RelPermalink $section.RelPermalink }} active{{ end }}">
        {{ $section.Title }}
      </a>
      {{ if $section.RegularPages }}
      <ul class="nav-list">
        {{ range $section.RegularPages.ByTitle }}
        <li>
          <a href="{{ .RelPermalink }}"
             class="nav-link{{ if eq $.RelPermalink .RelPermalink }} active{{ end }}">
            {{ .Title }}
          </a>
        </li>
        {{ end }}
      </ul>
      {{ end }}
    </div>
  {{ end }}
</nav>
